<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0F172A,#1E293B,#312E81);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:900px;
background:white;
border-radius:20px;
overflow:hidden;
display:flex;
box-shadow:0 20px 40px rgba(0,0,0,.35);
}

.left{
width:50%;
background:#EEF4FF;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.left img{
width:90%;
border-radius:15px;
}

.right{
width:50%;
padding:50px;
}

.right h2{
color:#1E3A8A;
font-size:32px;
margin-bottom:15px;
}

.right p{
color:#666;
line-height:28px;
margin-bottom:30px;
}

.input-box{
margin-bottom:20px;
}

.input-box label{
display:block;
margin-bottom:8px;
font-weight:bold;
color:#333;
}

.input-box input{
width:100%;
padding:14px;
border:2px solid #ddd;
border-radius:10px;
font-size:15px;
transition:.3s;
}

.input-box input:focus{
outline:none;
border-color:#2563EB;
}

button{
width:100%;
padding:15px;
background:#2563EB;
color:white;
border:none;
border-radius:10px;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1D4ED8;
}

.back{
margin-top:25px;
text-align:center;
}

.back a{
text-decoration:none;
color:#2563EB;
font-weight:bold;
}

.back a:hover{
text-decoration:underline;
}

@media(max-width:850px){

.container{
flex-direction:column;
width:95%;
}

.left,
.right{
width:100%;
}

.left{
padding:20px;
}

.right{
padding:35px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800&auto=format&fit=crop" alt="Reset Password">

</div>

<div class="right">

<h2>Reset Password</h2>

<p>

Create a new password for your account.
Make sure your password is strong and easy to remember.

</p>

<form>

<div class="input-box">

<label>New Password</label>

<input
type="password"
placeholder="Enter New Password"
required>

</div>

<div class="input-box">

<label>Confirm Password</label>

<input
type="password"
placeholder="Confirm New Password"
required>

</div>

<button
type="button"
onclick="window.location.href='login.html'">

Reset Password

</button>

</form>

<div class="back">

<a href="login.html">

← Back to Login

</a>

</div>

</div>

</div>

</body>
</html>
